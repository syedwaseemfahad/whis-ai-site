<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Whis-AI Partner Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
      body { background-color: #050814; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .glass-card { background: rgba(15, 20, 35, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
      .social-icon { transition: all 0.2s ease; cursor: pointer; }
      .social-icon:hover { transform: translateY(-2px) scale(1.1); }
      .social-icon.insta:hover { color: #E1306C; }
      .social-icon.yt:hover { color: #FF0000; }
      .social-icon.x:hover { color: #1DA1F2; }
      .social-icon.fb:hover { color: #1877F2; }
      input { transition: border-color 0.2s ease; }
      .fade-in { animation: fadeIn 0.4s ease forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative overflow-hidden">
    
    <div class="absolute top-[-20%] left-[-10%] w-[80vw] h-[80vh] bg-sky-500 rounded-full blur-[150px] opacity-10 pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vh] bg-emerald-500 rounded-full blur-[150px] opacity-10 pointer-events-none"></div>

    <div id="mainContainer" class="max-w-md w-full glass-card rounded-2xl p-8 shadow-2xl relative z-10 transition-all duration-500 hidden">
        
        <div id="authHeader" class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 mb-4">
                <i class="fa-solid fa-chart-line text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2 tracking-tight">Partner Portal</h1>
            <p class="text-slate-400 text-sm leading-relaxed">Sign in or register to access your links and track payouts.</p>
        </div>

        <div id="socialIcons" class="flex justify-center gap-5 text-slate-500 text-xl mb-8">
            <i class="fa-brands fa-instagram social-icon insta"></i>
            <i class="fa-brands fa-youtube social-icon yt"></i>
            <i class="fa-brands fa-twitter social-icon x"></i>
            <i class="fa-brands fa-facebook social-icon fb"></i>
        </div>

        <form id="step1Form" class="space-y-4" onsubmit="requestOTP(event)">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Email Address</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="email" id="pEmail" required class="w-full bg-[#0a0d16] border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:border-sky-500 outline-none" placeholder="creator@email.com">
                </div>
            </div>
            <button type="submit" id="otpBtn" class="w-full py-3.5 mt-2 rounded-xl bg-white text-slate-900 font-bold hover:bg-slate-200 transition shadow-[0_0_20px_rgba(255,255,255,0.1)] text-sm">
                Continue <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
            <p id="step1Error" class="text-xs text-red-400 text-center mt-2 hidden"></p>
        </form>

        <form id="step2Form" class="space-y-4 hidden fade-in" onsubmit="verifyAndRegister(event)">
            <div class="text-center mb-4">
                <p class="text-sm text-slate-400">OTP sent to <span id="displayEmail" class="text-sky-400 font-medium"></span></p>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-widest mb-1.5">Enter 6-Digit OTP</label>
                <input type="text" id="pOtp" required class="w-full bg-sky-500/10 border border-sky-500/30 text-sky-300 rounded-xl px-4 py-3 text-center text-xl tracking-[0.5em] font-bold focus:border-sky-400 outline-none" placeholder="••••••" maxlength="6">
            </div>
            
            <div id="registrationFields" class="grid grid-cols-2 gap-4 mt-4 hidden">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Name / Brand</label>
                    <input type="text" id="pName" class="w-full bg-[#0a0d16] border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-sky-500 outline-none" placeholder="e.g., Code with John">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Main Social Link</label>
                    <input type="url" id="pSocial" class="w-full bg-[#0a0d16] border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-sky-500 outline-none" placeholder="https://youtube.com/...">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Payout UPI ID</label>
                    <input type="text" id="pUpi" class="w-full bg-[#0a0d16] border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-sky-500 outline-none" placeholder="name@okhdfc">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-3.5 mt-4 rounded-xl bg-sky-500 text-white font-bold hover:bg-sky-400 transition shadow-[0_0_20px_rgba(2,132,199,0.4)] text-sm flex items-center justify-center gap-2">
                Verify & Access Dashboard
            </button>
            <p id="step2Error" class="text-xs text-red-400 text-center mt-2 hidden"></p>
        </form>

        <div id="dashboardView" class="hidden fade-in">
            <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
                <div>
                    <h2 class="text-xl font-bold text-white mb-1">Welcome, <span id="dashName" class="text-sky-400">Partner</span></h2>
                    <p class="text-xs text-slate-400">Payouts routed to: <span id="dashUpi" class="font-mono text-slate-300"></span></p>
                </div>
                <div class="text-[10px] font-bold uppercase tracking-widest text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-full border border-emerald-500/20 flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div> Active
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-[#0a0d16] border border-slate-800 rounded-xl p-4 shadow-inner">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Sales</p>
                    <p id="dashSales" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="bg-sky-500/5 border border-sky-500/20 rounded-xl p-4 shadow-inner">
                    <p class="text-[10px] font-bold text-sky-400 uppercase tracking-widest mb-1">Total Earnings</p>
                    <p class="text-3xl font-bold text-white">₹<span id="dashEarnings">0</span></p>
                </div>
            </div>

            <div class="bg-emerald-500/5 border border-emerald-500/20 rounded-xl p-5 text-center">
                <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mb-2"><i class="fa-solid fa-link"></i> Your Unique Referral Link</p>
                <input type="text" id="linkOutput" readonly class="w-full bg-[#0a0d16] border border-emerald-500/30 text-emerald-300 rounded-lg px-3 py-3 text-center text-sm mb-3 outline-none font-mono cursor-pointer" onclick="this.select()">
                <button onclick="copyLink()" class="text-sm font-bold bg-emerald-500 text-slate-900 w-full py-3 rounded-xl hover:bg-emerald-400 transition shadow-[0_0_15px_rgba(16,185,129,0.3)] active:scale-95">Copy to Clipboard</button>
            </div>
            
            <button onclick="signOutPartner()" class="w-full text-center mt-6 text-xs text-slate-500 hover:text-slate-300 transition">Sign Out</button>
        </div>

    </div>

    <div id="loadingState" class="flex flex-col items-center justify-center relative z-20">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-sky-500 mb-4"></i>
        <p class="text-slate-400 text-sm">Authenticating...</p>
    </div>

    <script>
        let storedEmail = "";
        let isNewPartner = false;
        const BACKEND_URL = "https://api.whis-ai.com"; 

        // AUTO-LOGIN CHECK ON LOAD
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem('whisPartnerToken');
            const expiry = localStorage.getItem('whisPartnerExpiry');

            if (token && expiry && Date.now() < parseInt(expiry)) {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/influencer/me`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token })
                    });
                    const data = await res.json();
                    
                    if(data.success) {
                        showDashboard(data.influencer);
                        return;
                    }
                } catch(e) {
                    console.log("Auto-login failed", e);
                }
            }
            
            // If no token or failed, show login screen
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
        });

        async function requestOTP(e) {
            e.preventDefault();
            const btn = document.getElementById('otpBtn');
            const errorText = document.getElementById('step1Error');
            const emailInput = document.getElementById('pEmail').value.toLowerCase().trim();
            
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;
            errorText.classList.add('hidden');

            try {
                const res = await fetch(`${BACKEND_URL}/api/influencer/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput })
                });
                
                const data = await res.json();
                
                if(data.success) {
                    storedEmail = emailInput;
                    isNewPartner = data.isNewUser;
                    
                    document.getElementById('displayEmail').innerText = storedEmail;
                    document.getElementById('step1Form').classList.add('hidden');
                    
                    // Show registration fields ONLY if it's a new user
                    if (isNewPartner) {
                        document.getElementById('registrationFields').classList.remove('hidden');
                        document.getElementById('pName').required = true;
                        document.getElementById('pUpi').required = true;
                        document.getElementById('submitBtn').innerText = "Create Account & Access Dashboard";
                    }

                    document.getElementById('step2Form').classList.remove('hidden');
                } else {
                    errorText.innerText = data.error || 'Failed to send OTP.';
                    errorText.classList.remove('hidden');
                    btn.innerHTML = 'Continue <i class="fa-solid fa-arrow-right ml-1"></i>';
                    btn.disabled = false;
                }
            } catch(err) {
                errorText.innerText = 'Network error. Please try again.';
                errorText.classList.remove('hidden');
                btn.innerHTML = 'Continue <i class="fa-solid fa-arrow-right ml-1"></i>';
                btn.disabled = false;
            }
        }

        async function verifyAndRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorText = document.getElementById('step2Error');
            
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';
            btn.disabled = true;
            errorText.classList.add('hidden');

            const payload = {
                email: storedEmail,
                otp: document.getElementById('pOtp').value,
                name: document.getElementById('pName').value,
                socialLink: document.getElementById('pSocial').value,
                upiId: document.getElementById('pUpi').value
            };

            try {
                const res = await fetch(`${BACKEND_URL}/api/influencer/verify-register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if(data.success) {
                    // CACHE THE LOGIN FOR 24 HOURS
                    localStorage.setItem('whisPartnerToken', data.influencer.influencerId);
                    localStorage.setItem('whisPartnerExpiry', Date.now() + (24 * 60 * 60 * 1000));
                    
                    showDashboard(data.influencer);
                } else {
                    errorText.innerText = data.error || 'Verification failed.';
                    errorText.classList.remove('hidden');
                    btn.innerHTML = isNewPartner ? "Create Account & Access Dashboard" : "Verify & Access Dashboard";
                    btn.disabled = false;
                }
            } catch(err) {
                errorText.innerText = 'Network error. Please try again.';
                errorText.classList.remove('hidden');
                btn.innerHTML = isNewPartner ? "Create Account & Access Dashboard" : "Verify & Access Dashboard";
                btn.disabled = false;
            }
        }

        function showDashboard(influencer) {
            // Hide loading state if it was there
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            
            // Hide auth elements
            document.getElementById('step1Form').classList.add('hidden');
            document.getElementById('step2Form').classList.add('hidden');
            document.getElementById('authHeader').classList.add('hidden');
            document.getElementById('socialIcons').classList.add('hidden');
            
            // Expand container slightly for the dashboard
            document.getElementById('mainContainer').classList.remove('max-w-md');
            document.getElementById('mainContainer').classList.add('max-w-lg');
            
            // Populate Dashboard Data
            document.getElementById('dashName').innerText = influencer.name;
            document.getElementById('dashUpi').innerText = influencer.upiId;
            document.getElementById('dashSales').innerText = influencer.sales;
            document.getElementById('dashEarnings').innerText = influencer.earnings.toLocaleString();
            document.getElementById('linkOutput').value = influencer.link;
            
            // Show Dashboard
            document.getElementById('dashboardView').classList.remove('hidden');
        }

        function signOutPartner() {
            localStorage.removeItem('whisPartnerToken');
            localStorage.removeItem('whisPartnerExpiry');
            location.reload();
        }

        function copyLink() {
            const copyText = document.getElementById("linkOutput");
            copyText.select();
            document.execCommand("copy");
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }
    </script>
</body>
</html>
