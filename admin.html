<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Whis-AI Support Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth mobile slide transition */
        .slide-in { animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Handle iOS safe areas so the input isn't blocked by the home indicator */
        .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="h-[100dvh] flex overflow-hidden w-full text-slate-900 bg-slate-50">

    <div id="adminLogin" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-sm px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2">Support Portal</h2>
            <p class="text-xs text-slate-500 mb-6">Enter admin password to access live chats.</p>
            <input type="password" id="adminPwd" placeholder="Password" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-sm focus:border-sky-500 outline-none mb-4" onkeypress="if(event.key === 'Enter') loginAdmin()">
            <button onclick="loginAdmin()" class="w-full bg-sky-600 text-white font-bold py-3 rounded-lg hover:bg-sky-700 transition shadow-sm active:scale-95">Access Portal</button>
            <p id="loginError" class="text-xs text-red-500 mt-3 hidden">Incorrect Password.</p>
        </div>
    </div>

    <div id="adminDashboard" class="flex w-full h-full hidden relative">
        
        <div id="sidebarPanel" class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-full shadow-sm z-20 shrink-0">
            <div class="p-4 bg-slate-900 text-white flex justify-between items-center shrink-0 shadow-md z-10">
                <h1 class="font-bold text-sm flex items-center"><i class="fa-solid fa-headset mr-2 text-sky-400"></i> Active Chats</h1>
                <button onclick="logoutAdmin()" class="text-xs text-slate-400 hover:text-white transition p-2"><i class="fa-solid fa-sign-out-alt"></i></button>
            </div>
            <div id="userList" class="flex-1 overflow-y-auto no-scrollbar divide-y divide-slate-100">
            </div>
        </div>

        <div id="chatPanel" class="hidden md:flex flex-1 flex-col bg-slate-50 relative w-full h-full absolute md:static inset-0 z-30">
            
            <div id="emptyState" class="absolute inset-0 hidden md:flex flex-col items-center justify-center bg-slate-50 z-20">
                <div class="w-20 h-20 bg-white rounded-full shadow-sm flex items-center justify-center mb-4">
                    <i class="fa-regular fa-comments text-3xl text-sky-400"></i>
                </div>
                <p class="text-slate-500 font-medium text-sm">Select a user to start chatting.</p>
            </div>

            <div id="activeChat" class="hidden flex-col h-full w-full bg-slate-50 relative z-10">
                
                <div class="bg-white border-b border-slate-200 p-3 shrink-0 flex items-center justify-between shadow-sm z-10 h-[64px]">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <button onclick="backToList()" class="md:hidden w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-600 hover:bg-slate-100 transition border border-slate-200 shadow-sm active:scale-95 shrink-0">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <div class="w-10 h-10 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold shrink-0">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="truncate">
                            <h2 id="activeEmail" class="font-bold text-slate-900 text-sm truncate">user@example.com</h2>
                            <p class="text-[10px] text-green-500 font-bold tracking-widest uppercase flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse inline-block"></span> Live
                            </p>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 pl-2 shrink-0" title="Toggle AI Auto-Reply">
                        <span class="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-wider">AI</span>
                        <button id="aiToggleBtn" onclick="toggleAI()" class="w-10 h-5 md:w-11 md:h-6 bg-green-500 rounded-full relative transition-colors duration-300 focus:outline-none shadow-inner border border-black/5">
                            <div id="aiToggleKnob" class="w-4 h-4 md:w-5 md:h-5 bg-white rounded-full absolute top-[1px] left-[2px] transition-transform duration-300 transform translate-x-[18px] md:translate-x-5 shadow flex items-center justify-center"></div>
                        </button>
                    </div>
                </div>

                <div id="adminMessagesArea" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar flex flex-col relative z-0">
                </div>

                <div class="bg-white border-t border-slate-200 shrink-0 safe-bottom px-3 pt-3">
                    <div class="flex gap-2 relative">
                        <input type="text" id="adminInput" placeholder="Type your reply..." class="flex-1 bg-slate-50 border border-slate-300 rounded-xl pl-4 pr-14 py-3 text-sm focus:border-sky-500 outline-none" onkeypress="if(event.key === 'Enter') sendAdminMessage()">
                        <button onclick="sendAdminMessage()" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-sky-600 text-white rounded-lg flex items-center justify-center hover:bg-sky-700 transition shadow-sm active:scale-95">
                            <i class="fa-solid fa-paper-plane text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const BACKEND_URL = "https://api.whis-ai.com"; 
        let adminPassword = sessionStorage.getItem('whisAdminPwd');
        let selectedEmail = null;
        let pollInterval = null;
        let activeChatCount = 0;
        let currentAiPaused = false;

        // Auto-login check
        if(adminPassword) {
            checkLogin();
        }

        // --- Smart Markdown Parser to fix AI bold tags ---
        function formatMessage(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.innerText = text; 
            let html = div.innerHTML;
            
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-inherit">$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em class="italic">$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code class="bg-black/10 px-1.5 py-0.5 rounded text-[11px] font-mono">$1</code>');
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }

        function updateToggleUI(isPaused) {
            currentAiPaused = isPaused;
            const btn = document.getElementById('aiToggleBtn');
            const knob = document.getElementById('aiToggleKnob');
            
            if (isPaused) {
                btn.classList.remove('bg-green-500');
                btn.classList.add('bg-slate-300');
                knob.classList.remove('translate-x-[18px]', 'md:translate-x-5');
                knob.classList.add('translate-x-0');
            } else {
                btn.classList.remove('bg-slate-300');
                btn.classList.add('bg-green-500');
                knob.classList.remove('translate-x-0');
                knob.classList.add('translate-x-[18px]', 'md:translate-x-5');
            }
        }

        async function toggleAI() {
            if (!selectedEmail) return;
            const newState = !currentAiPaused;
            updateToggleUI(newState); // Optimistic Update

            try {
                await fetch(`${BACKEND_URL}/api/admin/toggle-ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: selectedEmail, aiPaused: newState, password: adminPassword })
                });
            } catch(e) {
                console.error("Failed to toggle AI", e);
                updateToggleUI(!newState); // Revert on failure
            }
        }

        async function loginAdmin() {
            const pwd = document.getElementById('adminPwd').value;
            const res = await fetch(`${BACKEND_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            });
            const data = await res.json();
            if(data.success) {
                adminPassword = pwd;
                sessionStorage.setItem('whisAdminPwd', pwd);
                showDashboard();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function checkLogin() {
            const res = await fetch(`${BACKEND_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: adminPassword })
            });
            const data = await res.json();
            if(data.success) showDashboard();
            else { sessionStorage.removeItem('whisAdminPwd'); adminPassword = null; }
        }

        function logoutAdmin() {
            sessionStorage.removeItem('whisAdminPwd');
            adminPassword = null;
            clearInterval(pollInterval);
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminPwd').value = '';
            backToList();
        }

        function showDashboard() {
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            pollData();
            pollInterval = setInterval(pollData, 3000);
        }

        async function pollData() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/chats`);
                const data = await res.json();
                if(data.success) renderSidebar(data.chats);
            } catch(e) {}

            if(selectedEmail) {
                try {
                    const chatRes = await fetch(`${BACKEND_URL}/api/chat/history/${encodeURIComponent(selectedEmail)}`);
                    const chatData = await chatRes.json();
                    if(chatData.success) {
                        renderChat(chatData.messages);
                        
                        if (chatData.aiPaused !== undefined && chatData.aiPaused !== currentAiPaused) {
                            updateToggleUI(chatData.aiPaused);
                        }
                    }
                } catch(e) {}
            }
        }

        function renderSidebar(chats) {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            if(chats.length === 0) {
                list.innerHTML = '<div class="p-8 text-center flex flex-col items-center"><i class="fa-regular fa-comment-dots text-4xl text-slate-200 mb-3"></i><p class="text-xs text-slate-400">No active chats right now.</p></div>';
            }

            chats.forEach(chat => {
                const isSelected = chat._id === selectedEmail;
                const div = document.createElement('div');
                div.className = `p-4 cursor-pointer hover:bg-slate-50 transition border-l-4 ${isSelected ? 'border-sky-500 bg-sky-50' : 'border-transparent'}`;
                div.onclick = () => selectUser(chat._id);
                
                const timeStr = new Date(chat.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-sm text-slate-900 truncate pr-2 w-3/4">${chat._id}</span>
                        <span class="text-[10px] text-slate-400 whitespace-nowrap mt-0.5">${timeStr}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-500 truncate pr-2 w-5/6">${chat.latestMessage}</span>
                        ${chat.unreadCount > 0 ? `<span class="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shrink-0 shadow-sm">${chat.unreadCount}</span>` : ''}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function selectUser(email) {
            selectedEmail = email;
            activeChatCount = 0; 
            
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('md:flex');
            
            document.getElementById('activeChat').classList.remove('hidden');
            document.getElementById('activeChat').classList.add('flex');
            document.getElementById('activeEmail').innerText = email;
            
            const sidebar = document.getElementById('sidebarPanel');
            const chatPanel = document.getElementById('chatPanel');
            
            sidebar.classList.add('hidden', 'md:flex');
            chatPanel.classList.remove('hidden');
            chatPanel.classList.add('flex', 'slide-in');

            fetch(`${BACKEND_URL}/api/admin/mark-read`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: selectedEmail, password: adminPassword })
            });

            pollData();
            
            if(window.innerWidth >= 768) {
                document.getElementById('adminInput').focus();
            }
        }

        function backToList() {
            selectedEmail = null;
            
            const sidebar = document.getElementById('sidebarPanel');
            const chatPanel = document.getElementById('chatPanel');
            
            sidebar.classList.remove('hidden', 'md:flex');
            sidebar.classList.add('flex');
            
            chatPanel.classList.add('hidden');
            chatPanel.classList.remove('flex', 'slide-in');
            
            document.getElementById('activeChat').classList.add('hidden');
            document.getElementById('activeChat').classList.remove('flex');
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('md:flex');
        }

        function renderChat(messages) {
            const area = document.getElementById('adminMessagesArea');
            area.innerHTML = '';
            
            let lastDate = null;

            messages.forEach(msg => {
                const msgDate = new Date(msg.timestamp).toLocaleDateString();
                if(msgDate !== lastDate) {
                    const dateDiv = document.createElement('div');
                    dateDiv.className = "flex justify-center my-2";
                    dateDiv.innerHTML = `<span class="bg-slate-200/60 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">${msgDate}</span>`;
                    area.appendChild(dateDiv);
                    lastDate = msgDate;
                }

                const div = document.createElement('div');
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                if(msg.isSupport) {
                    div.className = `max-w-[85%] md:max-w-[75%] p-3 md:p-4 rounded-2xl text-sm shadow-sm bg-sky-600 text-white self-end rounded-tr-sm relative group`;
                    div.innerHTML = `
                        <div class="leading-relaxed">${formatMessage(msg.text)}</div>
                        <span class="text-[9px] text-sky-200 absolute -bottom-4 right-1 opacity-0 group-hover:opacity-100 transition">${timeStr}</span>
                    `;
                } else {
                    div.className = `max-w-[85%] md:max-w-[75%] p-3 md:p-4 rounded-2xl text-sm shadow-sm bg-white border border-slate-200 text-slate-800 self-start rounded-tl-sm relative group`;
                    div.innerHTML = `
                        <div class="leading-relaxed">${formatMessage(msg.text)}</div>
                        <span class="text-[9px] text-slate-400 absolute -bottom-4 left-1 opacity-0 group-hover:opacity-100 transition">${timeStr}</span>
                    `;
                }
                
                area.appendChild(div);
            });

            if(messages.length > activeChatCount) {
                area.scrollTop = area.scrollHeight;
                activeChatCount = messages.length;
            }
        }

        async function sendAdminMessage() {
            const input = document.getElementById('adminInput');
            const text = input.value.trim();
            if(!text || !selectedEmail) return;

            input.value = '';

            const area = document.getElementById('adminMessagesArea');
            const tempDiv = document.createElement('div');
            tempDiv.className = `max-w-[85%] md:max-w-[75%] p-3 md:p-4 rounded-2xl text-sm shadow-sm bg-sky-600/80 text-white self-end rounded-tr-sm`;
            tempDiv.innerHTML = `<div class="leading-relaxed">${formatMessage(text)}</div>`;
            area.appendChild(tempDiv);
            area.scrollTop = area.scrollHeight;

            try {
                await fetch(`${BACKEND_URL}/api/admin/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: selectedEmail, text, password: adminPassword })
                });
                pollData();
            } catch(e) {
                alert("Failed to send reply");
            }
        }
    </script>
</body>
</html>
