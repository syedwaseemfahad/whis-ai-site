<!DOCTYPE html>
<html>
<head>
  <title>Support Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">

<div class="max-w-md mx-auto mb-6 bg-yellow-100 border border-yellow-300 p-4 rounded-xl text-sm">
  <div class="font-bold mb-2">🔎 Debug: Loaded Admin Password From Server</div>
  <div id="debugPassword" class="font-mono text-red-600">Loading...</div>
</div>

<div id="loginBox" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
  <h2 class="text-lg font-bold mb-4">Admin Login</h2>
  <input id="adminPass" type="password" placeholder="Password" class="border w-full p-2 mb-3 rounded">
  <button onclick="login()" class="bg-sky-500 text-white px-4 py-2 rounded w-full">Login</button>
</div>

<div id="adminPanel" class="hidden grid grid-cols-3 gap-4 h-[80vh] mt-6">

  <div class="bg-white p-4 rounded-xl overflow-y-auto" id="conversationList"></div>

  <div class="col-span-2 bg-white p-4 rounded-xl flex flex-col">
    <div id="chatArea" class="flex-1 overflow-y-auto mb-3"></div>
    <div class="flex gap-2">
      <input id="replyInput" class="flex-1 border p-2 rounded">
      <button onclick="sendReply()" class="bg-sky-500 text-white px-4 rounded">Send</button>
    </div>
  </div>

</div>

<script>
let adminPassword = "";
let selectedEmail = "";

// Load debug password
async function loadDebugPassword() {
  try {
    const res = await fetch("/api/support/admin/debug-password");
    const data = await res.json();
    document.getElementById("debugPassword").innerText = data.loadedPassword;
  } catch (err) {
    document.getElementById("debugPassword").innerText = "Error loading";
  }
}

loadDebugPassword();

async function login() {
  const password = document.getElementById("adminPass").value;

  const res = await fetch("/api/support/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });

  if (res.ok) {
    adminPassword = password;
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    loadConversations();
  } else {
    alert("Wrong password");
  }
}

async function loadConversations() {
  const res = await fetch("/api/support/admin/conversations", {
    headers: { "x-admin-password": adminPassword }
  });

  const data = await res.json();
  const list = document.getElementById("conversationList");
  list.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "p-2 border-b cursor-pointer hover:bg-slate-50";
    div.innerText = c.userEmail;
    div.onclick = () => loadChat(c.userEmail);
    list.appendChild(div);
  });
}

async function loadChat(email) {
  selectedEmail = email;
  const res = await fetch(`/api/support/messages?email=${email}`);
  const data = await res.json();

  const chatArea = document.getElementById("chatArea");
  chatArea.innerHTML = "";

  data.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = m.sender === "admin" ? "text-right mb-2" : "text-left mb-2";
    div.innerHTML = `<div class="inline-block px-3 py-2 rounded ${
      m.sender === "admin"
      ? "bg-sky-500 text-white"
      : "bg-slate-200"
    }">${m.message}</div>`;
    chatArea.appendChild(div);
  });

  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendReply() {
  const message = document.getElementById("replyInput").value;

  await fetch("/api/support/admin/reply", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-password": adminPassword
    },
    body: JSON.stringify({
      email: selectedEmail,
      message
    })
  });

  document.getElementById("replyInput").value = "";
  loadChat(selectedEmail);
}
</script>

</body>
</html>
