<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whis-AI | Optimized Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#f8fafc', 500: '#0ea5e9', 600: '#0284c7', 900: '#0f172a' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hidden-tab { display: none !important; }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-slate-800">

    <div id="loginOverlay" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-900 px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-xl font-bold mb-4">Whis-AI Core</h2>
            <input type="password" id="adminPwd" placeholder="Password" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-sm focus:border-brand-500 outline-none mb-4" onkeypress="if(event.key === 'Enter') login()">
            <button onclick="login()" class="w-full bg-brand-900 text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition">Unlock System</button>
            <p id="loginError" class="text-xs text-red-500 mt-3 hidden">Access Denied.</p>
        </div>
    </div>

    <aside class="w-64 bg-brand-900 text-slate-300 flex flex-col h-full shrink-0">
        <div class="p-6 border-b border-slate-800 font-bold text-white flex items-center gap-2">
            <i class="fa-solid fa-bolt text-brand-500"></i> Command Center
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1">
            <button onclick="switchTab('analytics')" id="nav-analytics" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-slate-800 text-white text-sm font-medium">
                <i class="fa-solid fa-chart-line w-5"></i> Analytics
            </button>
            <button onclick="switchTab('users')" id="nav-users" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white text-sm font-medium">
                <i class="fa-solid fa-users w-5"></i> Users
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shrink-0">
            <h2 class="text-xl font-bold" id="header-title">Analytics</h2>
            <button onclick="syncData()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-semibold"><i class="fa-solid fa-rotate"></i> Sync</button>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div id="tab-analytics" class="tab-content flex flex-col gap-6">
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-xs text-slate-500 font-bold uppercase">Net Revenue</p>
                        <div class="flex items-baseline gap-2 mt-1">
                            <h3 class="text-2xl font-bold" id="kpi-rev-inr">₹0</h3>
                            <span class="text-xs font-bold text-slate-400" id="kpi-rev-usd">| $0</span>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-xs text-slate-500 font-bold uppercase">Valid Elite Users</p>
                        <h3 class="text-2xl font-bold text-brand-600 mt-1" id="kpi-elite">0</h3>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-xs text-slate-500 font-bold uppercase">Total Users</p>
                        <h3 class="text-2xl font-bold mt-1" id="kpi-total">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-[400px]">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>

            <div id="tab-users" class="tab-content hidden-tab h-full">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm h-full overflow-auto">
                    <table class="w-full text-left">
                        <thead class="sticky top-0 bg-white border-b border-slate-200">
                            <tr class="text-xs text-slate-500 uppercase font-bold">
                                <th class="px-6 py-4">User</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4">Joined</th>
                                <th class="px-6 py-4 text-right">Profile</th>
                            </tr>
                        </thead>
                        <tbody id="usersTbody" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                    <div id="loadMore" class="p-4 text-center">
                        <button onclick="loadUsers(currentPage + 1)" class="text-brand-600 font-bold text-xs uppercase tracking-widest hover:underline">Load More Records</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="userDrawer" class="fixed inset-y-0 right-0 w-[500px] bg-white shadow-2xl z-40 transform translate-x-full transition-transform duration-300 flex flex-col border-l">
            <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                <h2 class="font-bold">Detailed User Profile</h2>
                <button onclick="closeDrawer()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="drawerContent" class="flex-1 overflow-y-auto p-6 bg-slate-50"></div>
        </div>
    </main>

    <script>
        const BACKEND_URL = "https://whis-backend.onrender.com"; 
        let pwd = sessionStorage.getItem('whisAdmin');
        let currentPage = 0;
        let trafficChart = null;

        if(pwd) login(true);

        async function login(isAuto = false) {
            if(!isAuto) pwd = document.getElementById('adminPwd').value;
            try {
                const res = await fetch(`${BACKEND_URL}/api/dashboard/summary`, { headers: { 'x-dashboard-password': pwd } });
                if(res.ok) {
                    sessionStorage.setItem('whisAdmin', pwd);
                    document.getElementById('loginOverlay').classList.add('hidden');
                    syncData();
                } else if(!isAuto) { document.getElementById('loginError').classList.remove('hidden'); }
            } catch(e) { console.error(e); }
        }

        async function syncData() {
            const sumRes = await fetch(`${BACKEND_URL}/api/dashboard/summary`, { headers: { 'x-dashboard-password': pwd } });
            const data = await sumRes.json();
            
            document.getElementById('kpi-elite').innerText = data.eliteCount;
            document.getElementById('kpi-total').innerText = data.totalUsers;
            
            let inr = 0; let usd = 0;
            data.revenueStats.forEach(r => { if(r._id === 'USD') usd = r.total; else inr = r.total; });
            document.getElementById('kpi-rev-inr').innerText = `₹${inr.toLocaleString('en-IN')}`;
            document.getElementById('kpi-rev-usd').innerText = `| $${usd.toFixed(2)}`;
            
            renderTrafficChart(data.metrics);
            loadUsers(0);
        }

        async function loadUsers(page) {
            const res = await fetch(`${BACKEND_URL}/api/dashboard/users-list?page=${page}`, { headers: { 'x-dashboard-password': pwd } });
            const users = await res.json();
            const tbody = document.getElementById('usersTbody');
            if(page === 0) tbody.innerHTML = '';
            
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-semibold text-slate-800">${u.email}</td>
                    <td class="px-6 py-4 uppercase text-[10px] font-bold">${u.subscription?.tier || 'free'}</td>
                    <td class="px-6 py-4 text-xs text-slate-500">${new Date(u.createdAt).toLocaleDateString()}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="openDrawer('${u.googleId}')" class="text-brand-600 hover:text-brand-900"><i class="fa-solid fa-circle-info text-lg"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            currentPage = page;
        }

        async function openDrawer(gid) {
            document.getElementById('userDrawer').classList.remove('translate-x-full');
            document.getElementById('drawerContent').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading Profile...';
            
            const res = await fetch(`${BACKEND_URL}/api/dashboard/user-details/${gid}`, { headers: { 'x-dashboard-password': pwd } });
            const u = await res.json();
            
            document.getElementById('drawerContent').innerHTML = `
                <div class="space-y-6">
                    <div class="p-4 bg-white rounded-xl border border-slate-200">
                        <p class="text-[10px] uppercase font-bold text-slate-400 mb-2">Subscription Details</p>
                        <div class="grid grid-cols-2 text-sm gap-y-2">
                            <span>Tier:</span><b class="uppercase">${u.subscription.tier}</b>
                            <span>Valid Until:</span><b>${new Date(u.subscription.validUntil).toLocaleString()}</b>
                        </div>
                    </div>
                    <div class="p-4 bg-white rounded-xl border border-slate-200">
                        <p class="text-[10px] uppercase font-bold text-slate-400 mb-2">Order History</p>
                        ${u.orders.filter(o => o.status === 'paid').map(o => `
                            <div class="text-xs border-b py-2 flex justify-between">
                                <span>${o.amount} ${o.currency}</span>
                                <span class="text-slate-400">${new Date(o.date).toLocaleDateString()}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function closeDrawer() { document.getElementById('userDrawer').classList.add('translate-x-full'); }

        function renderTrafficChart(metrics) {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            if(trafficChart) trafficChart.destroy();
            trafficChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: metrics.map(m => m.date),
                    datasets: [{ label: 'Daily API Hits', data: metrics.map(m => m.hits), borderColor: '#0ea5e9', tension: 0.3, fill: true, backgroundColor: 'rgba(14, 165, 233, 0.05)' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden-tab'));
            document.getElementById(`tab-${t}`).classList.remove('hidden-tab');
            document.getElementById('header-title').innerText = t.charAt(0).toUpperCase() + t.slice(1);
        }
    </script>
</body>
</html>
